mixed-port: 7890
redir-port: 7892
tproxy-port: 7895
allow-lan: true
bind-address: "*"
mode: rule
log-level: info
ipv6: false
unified-delay: true
tcp-concurrent: true
geodata-mode: true

dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: false
  respect-rules: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter-mode: rule
  fake-ip-filter:
    - GEOSITE,private,real-ip
    - GEOSITE,cn,real-ip
    - DOMAIN-SUFFIX,localhost,real-ip
    - DOMAIN-SUFFIX,local,real-ip
    - DOMAIN-SUFFIX,lan,real-ip
    - DOMAIN-SUFFIX,msftconnecttest.com,real-ip
    - DOMAIN-SUFFIX,msftncsi.com,real-ip
    - MATCH,fake-ip
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29

  # 按域名策略选择 DNS，国内域名走国内 DNS，国外域名走代理 DNS
  nameserver-policy:
    "geosite:cn,private":
      - https://dns.alidns.com/dns-query
      - https://doh.pub/dns-query
    "geosite:geolocation-!cn":
      - "https://dns.google/dns-query#节点选择"
      - "https://1.1.1.1/dns-query#节点选择"

  nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query

  fallback:
    - "https://dns.google/dns-query#节点选择"
    - "https://1.1.1.1/dns-query#节点选择"

  fallback-filter:
    geoip: true
    geoip-code: CN
    geosite:
      - gfw
    domain:
      - "+.openai.com"
      - "+.chatgpt.com"
      - "+.anthropic.com"
      - "+.claude.ai"
      - "+.google.com"
      - "+.googleapis.com"
      - "+.gstatic.com"
      - "+.googlevideo.com"
      - "+.youtube.com"
      - "+.facebook.com"
      - "+.telegram.org"

  proxy-server-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query

  direct-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query

  direct-nameserver-follow-policy: true

proxies:
  - name: "自己的节点名称" # 改成你自己的节点名称，可自定义
    type: vless
    server: YOUR_VPS_IP_OR_DOMAIN # 必改：改成你自己的 VPS IP 或域名
    port: 443 # 必改：改成你自己的端口
    uuid: "YOUR_UUID_HERE" # 必改：改成你自己的 UUID
    udp: true
    flow: xtls-rprx-vision
    packet-encoding: xudp
    tls: true
    servername: "YOUR_SNI_DOMAIN" # 必改：改成你自己节点使用的 SNI / 伪装域名
    client-fingerprint: chrome
    reality-opts:
      public-key: "YOUR_REALITY_PUBLIC_KEY" # 必改：改成你自己的 Reality 公钥
      short-id: "YOUR_SHORT_ID" # 必改：改成你自己的 short-id
    network: tcp

proxy-groups:
  - name: 节点选择
    type: select
    proxies:
      - 自己的节点名称 # 改成你自己的节点名称，可自定义
      - DIRECT

  - name: 国外服务
    type: select
    proxies:
      - 节点选择
      - 自己的节点名称 # 改成你自己的节点名称，可自定义
      - DIRECT

  - name: AI服务
    type: select
    proxies:
      - 节点选择
      - 自己的节点名称 # 改成你自己的节点名称，可自定义
      - DIRECT

  - name: 流媒体
    type: select
    proxies:
      - 节点选择
      - 自己的节点名称 # 改成你自己的节点名称，可自定义
      - DIRECT

  - name: 漏网之鱼
    type: select
    proxies:
      - 节点选择
      - 自己的节点名称 # 改成你自己的节点名称，可自定义
      - DIRECT

